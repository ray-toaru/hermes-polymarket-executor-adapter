name: ci

on:
  workflow_call:
  push:
    paths:
      - ".github/**"
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "AGENTS.md"
      - "constraints-ci.txt"
      - "README.md"
      - "pyproject.toml"
  pull_request:
    paths:
      - ".github/**"
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "AGENTS.md"
      - "constraints-ci.txt"
      - "README.md"
      - "pyproject.toml"

permissions:
  contents: read
  actions: write

env:
  HERMES_PROFILE: hm-pdp-test

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Checkout pinned Hermes Agent test dependency
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          repository: NousResearch/hermes-agent
          ref: 729a778af0b3f984b4934361cad3050f6afb79ba
          path: hermes-agent

      - name: Install Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip==25.3
          python -m pip install -c constraints-ci.txt -e ".[test]"
          python -m pip install ruff==0.15.15 mypy==2.1.0 bandit==1.9.4

      - name: Run tests
        env:
          PYTHONPATH: src
          HERMES_AGENT_ROOT: ${{ github.workspace }}/hermes-agent
        run: python -m pytest -q tests

      - name: Lint sources
        run: python -m ruff check src tests

      - name: Type-check sources
        run: python -m mypy src

      - name: Security scan sources
        run: python -m bandit -q -r src

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Build distribution artifacts
        run: python -m build --sdist --wheel

      - name: Install built wheel and smoke console entry point
        run: |
          python -m pip install --force-reinstall dist/*.whl
          pmx-executor-adapter --help
